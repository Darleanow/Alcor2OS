# ci.yml — runs on every push and pull-request (all branches).
#
# Jobs:
#   lint        — clang-format diff check + cppcheck
#   build       — kernel compiled with clang-18 + ccache → bootable ISO
#
# The ISO is kernel-only (iso-kernel target) so this job completes fast.
# Full disk image build lives in release.yml (main / tags only).

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

# Cancel in-progress runs for the same branch/PR when a new push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  MUSL_VER:    "1.2.5"
  LIMINE_REV:  "v8.x-binary"
  TCC_VER:     "0.9.27"
  LLVM_VER:    "18"

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format check
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lint tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang-format-18 \
            cppcheck

      - name: clang-format diff check
        run: |
          # Run clang-format in check mode; any diff means the file is
          # not formatted → fail with a useful diff printed to the log.
          find src include user \
            \( -name '*.c' -o -name '*.h' \) \
            ! -path '*/.cache/*' \
            -print0 \
          | xargs -0 clang-format-18 --dry-run --Werror 2>&1 \
          || {
            echo ""
            echo "┌─ Format violations detected ──────────────────────────────────┐"
            echo "│  Run: make fmt   (or: clang-format -i <files>)                │"
            echo "└───────────────────────────────────────────────────────────────┘"
            exit 1
          }

      - name: cppcheck
        run: |
          cppcheck \
            --enable=warning,style,performance,portability \
            --suppress=missingIncludeSystem \
            --inline-suppr \
            --quiet \
            --error-exitcode=1 \
            -I include \
            src/ user/ \
          2>&1 | tee cppcheck.log
          # Surface any errors even when exit code is captured by tee
          ! grep -q "^.\+: error:" cppcheck.log || exit 1

  # ── Build kernel ISO ──────────────────────────────────────────────────────
  build:
    name: Build kernel ISO (clang-18, ccache)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # limine clone inside Makefile needs history

      # ── System packages ──────────────────────────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang-18 \
            lld-18 \
            nasm \
            xorriso \
            mtools \
            e2fsprogs \
            curl \
            git \
            make \
            ccache \
            ca-certificates

          # Expose clang-18 as plain `clang` / `ld.lld` for the Makefile
          sudo update-alternatives --install /usr/bin/clang   clang   /usr/bin/clang-18   100
          sudo update-alternatives --install /usr/bin/ld.lld  ld.lld  /usr/bin/ld.lld-18  100

      # ── ccache ───────────────────────────────────────────────────────────
      # Key includes a hash of all sources so a cache hit means *every* .c
      # is unchanged → zero recompilations on repeat pushes.
      # The restore-key falls back to the most recent partial cache.
      - name: Restore ccache
        id: ccache-restore
        uses: actions/cache/restore@v4
        with:
          path: ~/.ccache
          key: ccache-clang18-${{ hashFiles('src/**/*.c', 'src/**/*.h', 'include/**/*.h') }}
          restore-keys: |
            ccache-clang18-

      - name: Configure ccache
        run: |
          ccache --max-size=512M
          ccache --zero-stats
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV

      # ── Third-party: Limine ───────────────────────────────────────────────
      # Key: version string + versions.mk hash (changes when LIMINE_REV changes)
      - name: Restore Limine cache
        id: cache-limine
        uses: actions/cache@v4
        with:
          path: thirdparty/limine
          key: limine-${{ env.LIMINE_REV }}-${{ hashFiles('mk/versions.mk') }}
          restore-keys: |
            limine-${{ env.LIMINE_REV }}-

      # ── Third-party: musl ─────────────────────────────────────────────────
      - name: Restore musl cache
        id: cache-musl
        uses: actions/cache@v4
        with:
          path: thirdparty/musl
          key: musl-${{ env.MUSL_VER }}-${{ hashFiles('mk/thirdparty.mk', 'mk/versions.mk') }}
          restore-keys: |
            musl-${{ env.MUSL_VER }}-

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build kernel + ISO (kernel-only, fast)
        run: |
          make iso-kernel \
            CC=clang \
            LD=ld.lld \
            CCACHE=1 \
            -j$(nproc) \
            2>&1

      # ── ccache stats (visible in the log) ────────────────────────────────
      - name: Print ccache stats
        if: always()
        run: ccache --show-stats

      # ── Save ccache (only on success, only on default branch pushes) ──────
      # We always save so that a partial warm-up is reused next run.
      - name: Save ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.ccache
          key: ccache-clang18-${{ hashFiles('src/**/*.c', 'src/**/*.h', 'include/**/*.h') }}

      # ── Artifact ─────────────────────────────────────────────────────────
      - name: Prepare artifact metadata
        run: |
          mkdir -p release
          cp build/alcor2.iso release/alcor2.iso
          cat > release/BUILD_INFO.txt <<EOF
          Alcor2 OS — CI build
          ====================
          Commit  : ${{ github.sha }}
          Ref     : ${{ github.ref_name }}
          Runner  : ubuntu-24.04 / clang-18
          ccache  : ${{ steps.ccache-restore.outputs.cache-hit == 'true' && 'HIT' || 'MISS (first build or key changed)' }}
          Date    : $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EOF

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: alcor2-iso-${{ github.sha }}
          path: |
            release/alcor2.iso
            release/BUILD_INFO.txt
          retention-days: 14
          compression-level: 0   # ISO is already compressed
