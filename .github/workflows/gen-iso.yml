name: Build Alcor2 ISO

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    name: Build x86_64 ISO
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # needed so limine's git clone inside Makefile works

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc \
            nasm \
            binutils \
            xorriso \
            mtools \
            e2fsprogs \
            curl \
            git \
            make \
            ca-certificates

      - name: Cache musl libc
        id: cache-musl
        uses: actions/cache@v4
        with:
          path: thirdparty/musl
          key: musl-1.2.5-${{ runner.os }}

      - name: Cache Limine
        id: cache-limine
        uses: actions/cache@v4
        with:
          path: thirdparty/limine
          key: limine-v8.x-binary-${{ runner.os }}

      - name: Build ISO
        run: make iso -j$(nproc)

      - name: Create and populate disk image
        run: |
          make disk
          make disk-populate

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp build/alcor2.iso  release/alcor2.iso
          cp disk.img          release/disk.img

          # Build info file
          cat > release/BUILD_INFO.txt <<EOF
          Alcor2 OS — build info
          ======================
          Commit : ${{ github.sha }}
          Ref    : ${{ github.ref_name }}
          Runner : ${{ runner.os }} / ubuntu-24.04
          Date   : $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EOF

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: alcor2-iso-${{ github.sha }}
          path: release/alcor2.iso
          retention-days: 30

      - name: Upload disk image artifact
        uses: actions/upload-artifact@v4
        with:
          name: alcor2-disk-${{ github.sha }}
          path: release/disk.img
          retention-days: 30

      - name: Upload build info
        uses: actions/upload-artifact@v4
        with:
          name: alcor2-build-info-${{ github.sha }}
          path: release/BUILD_INFO.txt
          retention-days: 30

  release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: alcor2-iso-${{ github.sha }}
          path: release

      - name: Download disk artifact
        uses: actions/download-artifact@v4
        with:
          name: alcor2-disk-${{ github.sha }}
          path: release

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Alcor2 ${{ github.ref_name }}"
          body: |
            ## Alcor2 — ${{ github.ref_name }}

            Built from commit `${{ github.sha }}`.

            ### Assets
            | File | Description |
            |------|-------------|
            | `alcor2.iso` | Bootable ISO (BIOS + UEFI) — burn or run with QEMU |
            | `disk.img`   | Pre-populated ext2 disk image (user binaries) |

            ### Quick boot
            ```bash
            qemu-system-x86_64 -cdrom alcor2.iso \
              -drive file=disk.img,format=raw,if=ide,cache=writethrough \
              -boot d -m 256M
            ```
          files: |
            release/alcor2.iso
            release/disk.img
          draft: false
          prerelease: false
